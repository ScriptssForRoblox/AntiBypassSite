<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verificando...</title>
    <link rel="icon" type="image/svg+xml" href="https://api.iconify.design/material-symbols:key-outline.svg?color=%2300aaff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #00aaff;
            --bg-dark: #0a0a0c;
            --card-bg: #16161e;
        }
        body { font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg-dark); color: white; margin: 0; }
        .container { 
            text-align: center; padding: 40px; background: var(--card-bg); 
            border-radius: 20px; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.7); 
            min-width: 380px; border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .hidden { display: none; }
        .key-box { 
            background: #000; padding: 25px; border-radius: 12px; 
            font-family: 'JetBrains Mono', monospace; font-size: 1.4em; 
            color: var(--primary-color); border: 2px solid var(--primary-color); 
            margin-top: 20px; animation: glow 1.5s infinite alternate; 
            letter-spacing: 2px;
        }
        .error-message { color: #ff4444; font-weight: bold; margin-top: 20px; }
        h1 { color: white; margin-bottom: 10px; font-size: 22px; }
        p { margin-top: 5px; color: #ccc; }

        .status-icon {
            font-size: 50px;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .copy-btn {
            margin-top: 15px;
            color: #666;
            cursor: pointer;
            font-size: 12px;
            transition: color 0.3s;
        }
        .copy-btn:hover { color: var(--primary-color); }

        /* Spinner de Carregamento */
        .loader {
            border: 4px solid #333;
            border-top: 4px solid #00aaff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes glow {
            from { box-shadow: 0 0 5px #005500; }
            to { box-shadow: 0 0 15px #00ff00; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></div>
            <h1>Verificando Bypass...</h1>
            <p>Aguarde enquanto checamos o cache do sistema.</p>
        </div>

        <div id="result" class="hidden">
            <div class="status-icon" style="color: #00ff00;"><i class="fas fa-key"></i></div>
            <h1>Sua Key Gerada:</h1>
            <div class="key-box" id="keyDisplay"></div>
            <div class="copy-btn" onclick="copyKey()"><i class="far fa-copy"></i> Clique para copiar</div>
            <p>Não compartilhe esta chave.</p>
        </div>

        <div id="bypassDetected" class="hidden error-message">
            <p>Bypass detectado! Você não passou pelo link inicial.</p>
            <p>Redirecionando para a página inicial...</p>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            try {
                const response = await fetch('/api/generate-key');
                const data = await response.json();

                // Simula um tempo de carregamento para ficar bonito
                setTimeout(() => {
                    document.getElementById('loading').classList.add('hidden');

                    if (response.ok) {
                        // Sucesso: Mostra a key gerada pelo servidor
                        document.getElementById('result').classList.remove('hidden');
                        document.getElementById('keyDisplay').innerText = data.key;
                    } else {
                        // Erro ou Bypass: Mostra mensagem de erro
                        document.getElementById('bypassDetected').classList.remove('hidden');
                        
                        // Redireciona após 3 segundos
                        setTimeout(() => {
                            window.location.href = "/";
                        }, 3000);
                    }
                }, 2000);

            } catch (error) {
                console.error("Erro na requisição:", error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('bypassDetected').innerText = "Erro ao conectar com o servidor.";
                document.getElementById('bypassDetected').classList.remove('hidden');
            }
        });

        function copyKey() {
            const keyText = document.getElementById('keyDisplay').innerText;
            navigator.clipboard.writeText(keyText);
            const btn = document.querySelector('.copy-btn');
            btn.innerHTML = '<i class="fas fa-check"></i> Copiado!';
            setTimeout(() => { btn.innerHTML = '<i class="far fa-copy"></i> Clique para copiar'; }, 2000);
        }
    </script>
</body>
</html>
