<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Verificando...</title>
    <link rel="icon" type="image/svg+xml" href="https://api.iconify.design/material-symbols:key-outline.svg?color=%2300aaff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="loading">
            <div class="status-icon"><i class="fas fa-circle-notch fa-spin"></i></div>
            <h1>Verificando Bypass...</h1>
            <p>Aguarde enquanto checamos o cache do sistema.</p>
        </div>

        <div id="result" class="hidden">
            <div class="status-icon" style="color: #00ff00;"><i class="fas fa-key"></i></div>
            <h1>Sua Key Gerada:</h1>
            <div class="key-box" id="keyDisplay"></div>
            <div class="copy-btn" onclick="copyKey()"><i class="far fa-copy"></i> Clique para copiar</div>
            <p>Não compartilhe esta chave.</p>
        </div>

        <div id="bypassDetected" class="hidden error-message">
            <p>Bypass detectado! Você não passou pelo link inicial.</p>
            <p>Redirecionando para a página inicial...</p>
        </div>
    </div>

    <script src="generator.js"></script>
</body>
</html>
